{# Inline SVG symbol — bold truck mark with brand red/blue. Inherits currentColor. #}
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <symbol id="fs-logo" viewBox="0 0 162 80">
      {# speed streaks — brand red + blue, pop on light or dark #}
      <g class="fs-streak">
        <rect x="2"  y="19" width="30" height="7" rx="3.5" fill="#e11d2a"/>
        <rect x="10" y="36" width="24" height="7" rx="3.5" fill="#1d4ed8"/>
        <rect x="2"  y="53" width="30" height="7" rx="3.5" fill="#e11d2a" opacity=".5"/>
      </g>
      {# bold truck body — inherits currentColor (dark in header, white in footer) #}
      <g fill="currentColor">
        <rect x="40" y="13" width="70" height="43" rx="5"/>
        <path d="M110 25 h20 l18 17 v12 a2 2 0 0 1-2 2 h-36 z"/>
      </g>
      {# wheels with brand-colored hubs #}
      <circle cx="62" cy="62" r="10" fill="currentColor"/>
      <circle cx="132" cy="62" r="10" fill="currentColor"/>
      <circle cx="62" cy="62" r="3.6" fill="#e11d2a"/>
      <circle cx="132" cy="62" r="3.6" fill="#1d4ed8"/>
    </symbol>
  </defs>
</svg>
