<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{{ company.name }}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/brand/favicon-32.png') }}" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:#fff;
      background:radial-gradient(1200px 600px at 50% -10%, #1b2350 0%, #0d112a 55%, #090c20 100%);
    }
    .accent{position:fixed;top:0;left:0;width:100%;height:6px;display:flex}
    .accent i{flex:1}.accent i:first-child{background:#e11d2a}.accent i:last-child{background:#1d4ed8}
    .gate{width:100%;max-width:380px;text-align:center}
    .gate img{height:96px;width:auto;margin:0 auto 22px;display:block}
    .gate h1{font-size:1.15rem;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
    .gate p{color:#9aa3c7;font-size:.9rem;margin-bottom:24px}
    form{display:flex;flex-direction:column;gap:12px}
    input[type=password]{
      width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);color:#fff;font-size:1.05rem;text-align:center;letter-spacing:.3em;
      outline:none;transition:border-color .15s,background .15s;
    }
    input[type=password]:focus{border-color:#1d4ed8;background:rgba(255,255,255,.1)}
    input::placeholder{letter-spacing:normal;color:#6b73a0}
    button{
      width:100%;padding:14px 16px;border:0;border-radius:12px;cursor:pointer;
      background:#e11d2a;color:#fff;font-size:1rem;font-weight:600;transition:filter .15s;
    }
    button:hover{filter:brightness(1.08)}
    .err{color:#ff8a94;font-size:.85rem;min-height:1em}
  </style>
</head>
<body>
  <div class="accent" aria-hidden="true"><i></i><i></i></div>
  <main class="gate">
    <img src="{{ url_for('static', filename='img/brand/emblem-white.png') }}" alt="{{ company.name }}" />
    <h1>{{ company.name }}</h1>
    <p>This site is private. Enter the password to continue.</p>
    <form method="POST" action="{{ url_for('gate') }}">
      <input type="hidden" name="next" value="{{ next }}" />
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" inputmode="numeric" />
      <div class="err">{% if error %}Incorrect password. Please try again.{% endif %}</div>
      <button type="submit">Unlock</button>
    </form>
  </main>
</body>
</html>
