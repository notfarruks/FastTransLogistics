{% extends "base.html" %}
{% block title %}{{ company.name }} — {{ t.nav_partners }}{% endblock %}

{% block content %}
<section class="page-head">
  <div class="container narrow">
    <span class="eyebrow">{{ t.nav_partners }}</span>
    <h1>{{ t.partners_title }}</h1>
    <p class="lead">{{ t.partners_intro }}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="partner-grid">
      {% for p in partners %}
      <div class="partner-tile">{{ p }}</div>
      {% endfor %}
    </div>
  </div>
</section>

{% include "_cta.html" %}
{% endblock %}
