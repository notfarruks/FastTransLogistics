{% extends "base.html" %}
{% block title %}{{ company.name }} — {{ t.nav_partners }}{% endblock %}

{% block content %}
<section class="page-head">
  <div class="container narrow">
    <span class="bars" aria-hidden="true"><i></i><i></i></span><span class="eyebrow">{{ t.nav_partners }}</span>
    <h1>{{ t.partners_title }}</h1>
    <p class="lead">{{ t.partners_intro }}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="partner-grid">
      {% for p in partners %}
      <div class="partner-tile">
        <img class="partner-logo" src="{{ url_for('static', filename='img/partners/' + p.file) }}" alt="{{ p.name }}" loading="lazy" onerror="this.parentNode.classList.add('no-logo'); this.style.display='none';">
        <span class="partner-name">{{ p.name }}</span>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

{% include "_cta.html" %}
{% endblock %}
